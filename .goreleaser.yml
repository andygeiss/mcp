project_name: mcp

archives:
  - formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

builds:
  - main: ./cmd/mcp/
    binary: mcp
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X main.version={{ .Version }}

changelog:
  sort: asc

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - ${artifact}
    artifacts: checksum
