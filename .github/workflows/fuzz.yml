name: Nightly Fuzz

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Duration per fuzz target"
        default: "5m"
        type: string

permissions: read-all

env:
  FUZZTIME: ${{ inputs.fuzztime || '5m' }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: Discover and run fuzz targets
        run: |
          set -euo pipefail
          targets=$(grep -r 'func Fuzz_' --include='*_test.go' -l . | sort)
          for file in $targets; do
            dir=$(dirname "$file")
            funcs=$(grep -oP 'func \KFuzz_\w+' "$file")
            for func in $funcs; do
              echo "==> Fuzzing $func in $dir for $FUZZTIME"
              go test -fuzz "$func" "$dir" -fuzztime="$FUZZTIME"
            done
          done
