name: Nightly Fuzz

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Duration per fuzz target"
        default: "5m"
        type: string

permissions: read-all

env:
  FUZZTIME: ${{ inputs.fuzztime || '5m' }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run fuzz targets
        run: |
          set -euo pipefail
          echo "==> Fuzzing Fuzz_Decoder_With_ArbitraryInput in ./internal/protocol for $FUZZTIME"
          go test -fuzz Fuzz_Decoder_With_ArbitraryInput ./internal/protocol -fuzztime="$FUZZTIME"
          echo "==> Fuzzing Fuzz_Server_Pipeline in ./internal/server for $FUZZTIME"
          go test -fuzz Fuzz_Server_Pipeline ./internal/server -fuzztime="$FUZZTIME"
          echo "==> Fuzzing Fuzz_ValidateInput_With_ArbitraryInput in ./internal/tools for $FUZZTIME"
          go test -fuzz Fuzz_ValidateInput_With_ArbitraryInput ./internal/tools -fuzztime="$FUZZTIME"
          echo "==> Fuzzing Fuzz_ValidatePath_With_ArbitraryInput in ./internal/tools for $FUZZTIME"
          go test -fuzz Fuzz_ValidatePath_With_ArbitraryInput ./internal/tools -fuzztime="$FUZZTIME"
