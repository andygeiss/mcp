name: Nightly Fuzz

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Duration per fuzz target"
        default: "5m"
        type: string

permissions: read-all

env:
  FUZZTIME: ${{ inputs.fuzztime || '5m' }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Discover and run fuzz targets
        run: |
          set -euo pipefail
          targets=$(grep -r 'func Fuzz_' --include='*_test.go' -l . | sort)
          for file in $targets; do
            dir=$(dirname "$file")
            funcs=$(grep -oP 'func \KFuzz_\w+' "$file")
            for func in $funcs; do
              echo "==> Fuzzing $func in $dir for $FUZZTIME"
              go test -fuzz "$func" "$dir" -fuzztime="$FUZZTIME"
            done
          done
