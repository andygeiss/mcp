version: "2"

run:
  build-tags:
    - integration

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/andygeiss/mcp

linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - cyclop
    - depguard
    - dupword
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funcorder
    - funlen
    - gocheckcompilerdirectives
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gomoddirectives
    - gosec
    - govet
    - ineffassign
    - intrange
    - mirror
    - misspell
    - modernize
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nolintlint
    - nonamedreturns
    - paralleltest
    - perfsprint
    - predeclared
    - reassign
    - recvcheck
    - revive
    - sloglint
    - staticcheck
    - tagliatelle
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  settings:
    cyclop:
      max-complexity: 12
    depguard:
      rules:
        no-json-v2:
          deny:
            - pkg: "encoding/json/v2"
              desc: "use encoding/json (stable)"
            - pkg: "encoding/json/jsontext"
              desc: "use encoding/json (stable)"
        no-old-log:
          deny:
            - pkg: "log$"
              desc: "use log/slog for all logging"
        no-server-in-handlers:
          list-mode: lax
          files:
            - "**/internal/tools/**"
            - "**/internal/prompts/**"
          deny:
            - pkg: "github.com/andygeiss/mcp/internal/server"
              desc: "handlers must not import internal/server; use protocol.Peer (Invariant I1)"
    exhaustive:
      default-signifies-exhaustive: true
    forbidigo:
      forbid:
        - pattern: '^fmt\.Print(ln|f)?$'
          msg: "stdout is protocol-only; use fmt.Fprint with the injected io.Writer"
        - pattern: '^(print|println)$'
          msg: "use fmt.Fprint with the injected io.Writer"
        - pattern: '^os\.Stdout$'
          msg: "handlers must not write to stdout; stdout is protocol-reserved (Invariant I4)"
        - pattern: 'fmt\.Fprint[^(]*\(\s*os\.Stdout'
          msg: "handlers must not write to stdout; use slog to stderr (Invariant I4)"
      analyze-types: true
    funlen:
      lines: 80
      statements: 50
    gocognit:
      min-complexity: 15
    goconst:
      min-len: 3
      min-occurrences: 3
    nestif:
      min-complexity: 4
    nolintlint:
      require-explanation: true
      require-specific: true
    sloglint:
      key-naming-case: snake
      static-msg: true
    tagliatelle:
      case:
        rules:
          json: camel
  exclusions:
    generated: strict
    rules:
      - path: "cmd/"
        linters:
          - forbidigo
      - path: "_test\\.go"
        linters:
          - cyclop
          - funlen
          - gochecknoinits
          - gocognit
      - path: "_internal_test\\.go"
        linters:
          - testpackage
